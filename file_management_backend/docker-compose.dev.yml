# file_management_backend/docker-compose.dev.yml
# 阶段二 2.4：本地开发仅启动 Redis（API 仍用 pnpm dev 跑在宿主机）
services:
  redis:
    image: redis:7-alpine
    container_name: file_mgmt_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_dev_data:
