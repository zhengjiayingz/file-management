# file_management_backend/docker-compose.dev.yml
# 本地开发基础依赖：Redis（必需）+ MinIO（阶段七可选）
services:
  redis:
    image: redis:7-alpine
    container_name: file_mgmt_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: file_mgmt_minio_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_dev_data:/data
    restart: unless-stopped

volumes:
  redis_dev_data:
  minio_dev_data:
