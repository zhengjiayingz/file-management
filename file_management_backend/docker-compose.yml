services:

  # mysql:  # 已改用本机 MySQL（host.docker.internal:3306）
  #   image: mysql:8
  #   ...
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: . # 以当前目录（.）为上下文，也就是整个 file_management_backend
      dockerfile: Dockerfile # 按 Dockerfile 构建镜像
      target: api # 使用 target: api 这一层
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"  #容器端口映射到本机3000
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      # 容器内连宿主机 MySQL 时用 DOCKER_DATABASE_URL；未设置则回退 .env 的 DATABASE_URL
      DATABASE_URL: ${DOCKER_DATABASE_URL:-${DATABASE_URL}}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      UPLOAD_PATH: ./uploads
    volumes:
      - ./uploads:/app/uploads
      - ./previews:/app/previews
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "pnpm exec prisma migrate deploy && node dist/app.js"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      UPLOAD_PATH: ./uploads
    volumes:
      - ./uploads:/app/uploads
      - ./previews:/app/previews
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
