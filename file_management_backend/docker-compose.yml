services:

  # mysql:  # 已改用本机 MySQL（host.docker.internal:3306）
  #   image: mysql:8
  #   ...
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://root:09092639961300Zj@host.docker.internal:3306/file_management
      REDIS_URL: redis://redis:6379
      JWT_SECRET: file-management-secret-key-2024
      CORS_ORIGIN: http://localhost:5173
      UPLOAD_PATH: ./uploads
    volumes:
      - ./uploads:/app/uploads
      - ./previews:/app/previews
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "pnpm exec prisma migrate deploy && node dist/app.js"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      UPLOAD_PATH: ./uploads
    volumes:
      - ./uploads:/app/uploads
      - ./previews:/app/previews
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
